name: Chore
description: Maintenance, tooling, refactor with no user-visible change
labels: [type:chore, status:needs-triage]
body:
  - type: textarea
    id: what
    attributes:
      label: What needs doing
    validations:
      required: true
  - type: textarea
    id: why
    attributes:
      label: Why now
  - type: dropdown
    id: size
    attributes:
      label: Size
      options: [S, M, L]
    validations:
      required: true
