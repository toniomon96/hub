name: Feature
description: New capability
labels: [type:feat, status:needs-triage]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem statement
      description: User job + current pain.
    validations:
      required: true
  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance criteria
      description: Testable bullets.
      value: |
        - [ ]
        - [ ]
    validations:
      required: true
  - type: textarea
    id: notes
    attributes:
      label: Implementation notes
  - type: textarea
    id: ux
    attributes:
      label: UX acceptance (CLI)
      value: |
        - [ ] `--help` updated with at least one example
        - [ ] `--json` schema declared in `packages/cli/src/schemas/` if applicable
        - [ ] Error path tested: bad input → non-zero exit + remediation hint
        - [ ] `NO_COLOR` / non-TTY produces no ANSI escapes
  - type: textarea
    id: dod
    attributes:
      label: Definition of Done
      value: |
        - [ ] Tests added (Vitest)
        - [ ] `DECISIONS.md` appended if load-bearing
        - [ ] `CHANGELOG.md` line added
  - type: dropdown
    id: size
    attributes:
      label: Size
      options: [S, M, L]
    validations:
      required: true
  - type: dropdown
    id: risk
    attributes:
      label: Risk
      options: [Low, Medium, High]
    validations:
      required: true
