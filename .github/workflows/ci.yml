name: ci
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
jobs:
  ci:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.0
      - name: install
        run: pnpm install --frozen-lockfile
      - name: typecheck
        run: pnpm typecheck
      - name: lint
        run: pnpm lint
      - name: test
        run: pnpm test
